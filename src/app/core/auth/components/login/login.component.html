<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>
        <div class="header-content">
          <mat-icon class="logo-icon">lock</mat-icon>
          <h1>Course Management</h1>
        </div>
        <p class="subtitle">Sign in to your account</p>
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Username</mat-label>
            <input
              matInput
              formControlName="username"
              placeholder="Enter your username"
              type="text"
            />
            <mat-icon matPrefix>person</mat-icon>
            @if (isFieldInvalid("username")) {
              <mat-error>
                {{ getErrorMessage("username") }}
              </mat-error>
            }
          </mat-form-field>
        </div>

        <div class="form-group">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <input
              matInput
              formControlName="password"
              placeholder="Enter your password"
              [type]="hidePassword() ? 'password' : 'text'"
            />
            <mat-icon matPrefix>lock</mat-icon>
            <button
              mat-icon-button
              matSuffix
              type="button"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="'Hide password'"
              [attr.aria-pressed]="hidePassword()"
            >
              <mat-icon>{{
                hidePassword() ? "visibility_off" : "visibility"
              }}</mat-icon>
            </button>
            @if (isFieldInvalid("password")) {
              <mat-error>
                {{ getErrorMessage("password") }}
              </mat-error>
            }
          </mat-form-field>
        </div>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="isLoading() || loginForm.invalid"
          class="login-button"
        >
          @if (!isLoading()) {
            <mat-icon>login</mat-icon>
          } @else {
            <mat-spinner diameter="20" class="spinner-button"></mat-spinner>
          }
          {{ isLoading() ? "Signing in..." : "Sign In" }}
        </button>
      </form>

      <!-- <div class="demo-credentials">
        <p class="demo-label">Demo Credentials:</p>
        <p class="demo-text"><strong>Username:</strong> admin</p>
        <p class="demo-text"><strong>Password:</strong> 123456</p>
      </div> -->
    </mat-card-content>
  </mat-card>
</div>
